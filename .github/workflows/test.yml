name: test
on: push  # GitHubにpushされた時に自動で実行
jobs:
  test:
    runs-on: ubuntu-22.04  # 実行環境としてUbuntu Linuxの(22.04)を指定
    strategy:
      matrix:
        # 3.7から3.12までの5つのバージョンで並列にテストを実行
        python-version: ["3.8", "3.9", "3.10", "3.11", "3.12"]
    steps:
      - uses: actions/checkout@v3  # リポジトリのコードをダウンロード
      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v4  # 指定されたバージョンのPython環境を構築
        with:
          python-version: ${{ matrix.python-version }}
      - name: All test
        run: |
          chmod +x trig test.bash  # スクリプトに実行権限を付与
          bash -xv ./test.bash     # テストスクリプトを実行
